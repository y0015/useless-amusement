<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ QUANTUM DIAGNOSTIC MATRIX SYSTEM v3.6</title>
    <style>
        :root {
            --primary: #00ffcc;
            --primary-glow: rgba(0, 255, 204, 0.4);
            --secondary: #0077ff;
            --secondary-glow: rgba(0, 119, 255, 0.4);
            --bg-dark: #060810;
            --text: #e2e8f0;
            --panel-bg: rgba(8, 12, 24, 0.9);
            --alert: #00ff66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Consolas', 'Courier New', monospace, "Microsoft YaHei";
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas 动态粒子背景 */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.5;
            pointer-events: none; /* 防止画布拦截鼠标点击 */
        }

        /* CRT屏幕扫描线效果 */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.22) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* 核心外层面板 */
        .hud-container {
            width: 90%;
            max-width: 750px;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 8px;
            position: relative;
            z-index: 5; /* 提升层级，确保在最前 */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 40px rgba(0, 119, 255, 0.15), inset 0 0 20px rgba(0, 255, 204, 0.1);
            animation: panelPulse 4s infinite alternate;
        }

        @keyframes panelPulse {
            0% { box-shadow: 0 0 30px rgba(0, 119, 255, 0.15), inset 0 0 15px rgba(0, 255, 204, 0.05); }
            100% { box-shadow: 0 0 50px rgba(0, 255, 204, 0.25), inset 0 0 25px rgba(0, 77, 255, 0.15); }
        }

        /* 赛博装饰角标 */
        .hud-corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--primary);
            pointer-events: none;
        }
        .tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 24px;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        header p {
            font-size: 11px;
            color: #657b9c;
            letter-spacing: 2px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* 分页模块控制 */
        .page {
            display: none;
            width: 100%;
        }
        .page.active {
            display: block;
        }

        /* 1. 门户选择菜单 */
        .menu-grid {
            display: flex;
            gap: 25px;
            justify-content: center;
            padding: 10px 0;
        }

        .menu-card {
            flex: 1;
            background: rgba(0, 119, 255, 0.05);
            border: 1px solid rgba(0, 119, 255, 0.3);
            border-radius: 4px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 6;
        }

        .menu-card:hover {
            background: rgba(0, 255, 204, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        .menu-card h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .menu-card p {
            font-size: 11px;
            color: #8a99ad;
            line-height: 1.6;
        }

        /* 2. 检测通用主舞台 */
        .stage {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .cyber-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 18px 45px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            text-shadow: 0 0 8px var(--primary-glow);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
            z-index: 10;
        }

        .cyber-btn:hover {
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 30px var(--primary-glow);
            color: #fff;
        }

        /* 动态量子雷达 */
        .quantum-radar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .radar-bar {
            width: 4px;
            height: 30px;
            background: var(--secondary);
            animation: quantumWave 1s infinite ease-in-out;
        }
        .radar-bar:nth-child(2) { animation-delay: 0.1s; background: var(--primary); }
        .radar-bar:nth-child(3) { animation-delay: 0.2s; }
        .radar-bar:nth-child(4) { animation-delay: 0.3s; background: var(--primary); }
        .radar-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes quantumWave {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1.6); filter: drop-shadow(0 0 8px var(--primary)); }
        }

        /* 日志终端盒 */
        .terminal-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 119, 255, 0.3);
            border-radius: 4px;
            padding: 15px;
            height: 150px;
            overflow-y: hidden;
            font-size: 12px;
            color: #a0aec0;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            text-align: left;
        }

            margin-bottom: 6px;
            line-height: 1.
